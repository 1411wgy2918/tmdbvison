# CI 工作流：代码质量检查
# 兼容 Node.js 20+ (2025-09 起 runners 默认)
name: Code Quality CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  analyze:
    name: Analyze Code Quality
    runs-on: ubuntu-24.04  # 使用最新 runner，预装 Node.js 22
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2  # 升级到 v3，支持 Node.js 20+
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Check Dart format
        run: dart format --output=none --set-exit-if-changed .
        continue-on-error: true
      
      - name: Analyze project
        run: flutter analyze
      
      - name: Run tests
        run: flutter test
        continue-on-error: true
