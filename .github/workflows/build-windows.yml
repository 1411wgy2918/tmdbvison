# Windows 编译工作流
# 兼容 Node.js 20+ (2025-09 起 runners 默认)
name: Windows Build CI

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  APP_NAME: TMDBvision
  BUILD_NUMBER: ${{ github.run_number }}

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-2022  # Windows Server 2022, Node.js 20+
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2  # v3 支持 Node.js 20+
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true
      
      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build Windows (Debug)
        run: flutter build windows --debug
      
      - name: Build Windows (Release)
        run: flutter build windows --release
      
      - name: Create distribution package
        run: |
          if (Test-Path build/windows/x64/runner/Release) {
            $releasePath = "build/windows/x64/runner/Release"
          } else {
            $releasePath = "build/windows/runner/Release"
          }
          $zipName = "build/TMDBvision-windows-${{ github.run_number }}.zip"
          Compress-Archive -Path "$releasePath/*" -DestinationPath $zipName

      - name: Upload Windows Build
        uses: actions/upload-artifact@v5
        with:
          name: windows-build
          path: build/TMDBvision-windows-${{ github.run_number }}.zip
          retention-days: 7

      - name: Upload Windows Release Folder
        uses: actions/upload-artifact@v5
        with:
          name: windows-release
          path: |
            build/windows/x64/runner/Release/
            build/windows/runner/Release/
          retention-days: 7
  
  release:
    name: Create Release
    needs: build-windows
    runs-on: windows-2022
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download Windows Build
        uses: actions/download-artifact@v5  # 更新到 v5
        with:
          name: windows-release
          path: artifacts/
      
      - name: Create Release
        uses: softprops/action-gh-release@v2  # 更新到 v2
        with:
          files: artifacts/**
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
