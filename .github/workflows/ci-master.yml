# 综合 CI 工作流
# 兼容 Node.js 20+ (2025-09 起 runners 默认)
name: Master CI Pipeline

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.44.1'

jobs:
  quality-check:
    name: Code Quality
    runs-on: ubuntu-24.04  # Node.js 22
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2  # v3 支持 Node.js 20+
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Analyze
        run: flutter analyze
      
      - name: Test
        run: flutter test
        continue-on-error: true
  
  build-matrix:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04  # Node.js 22
            platform: android
          - os: ubuntu-24.04
            platform: linux
          - os: windows-2022  # Node.js 20+
            platform: windows
          - os: macos-13  # macOS 13, Node.js 20+
            platform: macos
    
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: quality-check
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev liblzma-dev libasound2-dev libayatana-appindicator3-dev libwebkit2gtk-4.1-dev pkg-config libva-dev libva-drm2 libva-x11-2 libva-wayland2 libvdpau-dev
          # desktop_webview_window plugin expects webkit2gtk-4.0, symlink to 4.1 on Ubuntu 24.04
          sudo ln -sf /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc

      - name: Enable platform support
        run: |
          if [ "${{ matrix.platform }}" = "linux" ]; then
            flutter config --enable-linux-desktop
          elif [ "${{ matrix.platform }}" = "windows" ]; then
            flutter config --enable-windows-desktop
          elif [ "${{ matrix.platform }}" = "macos" ]; then
            flutter config --enable-macos-desktop
          fi
        shell: bash
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build Android
        if: matrix.platform == 'android'
        run: flutter build apk --release
      
      - name: Build Linux
        if: matrix.platform == 'linux'
        run: flutter build linux --release
      
      - name: Build Windows
        if: matrix.platform == 'windows'
        run: flutter build windows --release
      
      - name: Build macOS
        if: matrix.platform == 'macos'
        run: flutter build macos --release
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v5  # 更新到 v5
        with:
          name: ${{ matrix.platform }}-build-${{ github.run_number }}
          path: |
            build/app/outputs/**/*.apk
            build/app/outputs/**/*.aab
            build/linux/**/release/
            build/windows/**/Release/
            build/macos/Build/Products/Release/*.app
          retention-days: 7
          if-no-files-found: ignore
